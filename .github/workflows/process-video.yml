name: Process Video — ExpansionOS

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Google Drive download URL'
        required: true
      segments:
        description: 'JSON array of {start, end} segments to keep'
        required: true
      captions:
        description: 'JSON array of {text, start, end} captions'
        required: true
      filename:
        description: 'Original video filename'
        required: true
      webhook_url:
        description: 'n8n resume webhook URL'
        required: true
      overlay_text:
        description: 'Text card to show (black screen, slides in from left). Leave empty to skip.'
        required: false
        default: ''
      overlay_position:
        description: 'Where to place the text card: start or end'
        required: false
        default: 'start'

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Download source video
        run: |
          pip install gdown --quiet
          FILE_ID=$(echo "${{ github.event.inputs.video_url }}" | grep -oP '(?<=id=)[^&]+')
          echo "Downloading file ID: $FILE_ID"
          gdown "$FILE_ID" -O source_video.mp4
          if [ ! -s source_video.mp4 ]; then
            echo "ERROR: Download failed or file is empty"
            exit 1
          fi
          echo "Downloaded: $(du -h source_video.mp4)"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Process video with FFmpeg
        env:
          SEGMENTS: ${{ github.event.inputs.segments }}
          CAPTIONS: ${{ github.event.inputs.captions }}
        run: |
          python3 << 'PYTHON'
          import json, os, re, subprocess, sys

          segments = json.loads(os.environ['SEGMENTS'])
          captions  = json.loads(os.environ['CAPTIONS'])

          if not segments:
              print("ERROR: No segments provided")
              sys.exit(1)

          # ── Probe video ───────────────────────────────────────────────────
          probe = subprocess.run(
              ['ffprobe', '-v', 'quiet', '-print_format', 'json',
               '-show_streams', '-show_format', 'source_video.mp4'],
              capture_output=True, text=True, check=True
          )
          probe_data = json.loads(probe.stdout)
          streams    = probe_data['streams']
          vstream    = next(s for s in streams if s['codec_type'] == 'video')
          vw, vh     = int(vstream['width']), int(vstream['height'])
          has_audio  = any(s['codec_type'] == 'audio' for s in streams)
          total_dur  = float(probe_data['format']['duration'])
          print(f"Video: {vw}x{vh}  duration={total_dur:.1f}s  audio={'yes' if has_audio else 'no'}")
          print(f"Segments from n8n: {len(segments)}  captions: {len(captions)}")

          # ── Silence detection ─────────────────────────────────────────────
          # noise=-35dB : quieter than -35 dB = silence
          # d=0.5       : only silences LONGER than 0.5s are cut.
          #               Short pauses (≤ 0.5s) are left completely intact.
          LEAD_IN = 0.5   # seconds of silence to preserve before each speech burst
          audio_segs = []
          if has_audio:
              print("Running silencedetect (threshold: 0.5s)...")
              sd = subprocess.run(
                  ['ffmpeg', '-i', 'source_video.mp4',
                   '-af', 'silencedetect=noise=-30dB:d=0.5',
                   '-f', 'null', '-'],
                  capture_output=True, text=True
              )
              sil_starts = [float(x) for x in re.findall(r'silence_start: (-?\d+\.?\d*)', sd.stderr)]
              sil_ends   = [float(x) for x in re.findall(r'silence_end: (-?\d+\.?\d*)',   sd.stderr)]
              if len(sil_starts) > len(sil_ends):
                  sil_ends.append(total_dur)

              prev = 0.0
              for ss, se in zip(sil_starts, sil_ends):
                  # Speech segment from prev → ss (all detected silences are >= 0.5s)
                  if ss - prev >= 0.1:
                      audio_segs.append({'start': round(prev, 3), 'end': round(ss, 3)})
                  # Next speech starts 0.5s BEFORE the silence ends (lead-in buffer)
                  # This keeps natural breath / room tone before each sentence
                  prev = round(max(ss, se - LEAD_IN), 3)

              # Final segment after last silence — includes end-of-video tail naturally
              if total_dur - prev >= 0.1:
                  audio_segs.append({'start': round(prev, 3), 'end': round(total_dur, 3)})

              print(f"Audio-active regions: {len(audio_segs)}")
              for s in audio_segs:
                  print(f"  [{s['start']:.2f} → {s['end']:.2f}]  ({s['end']-s['start']:.2f}s)")
          else:
              audio_segs = [{'start': 0.0, 'end': total_dur}]

          # ── Gate word-segments against audio regions ──────────────────────
          # Word-segments = filler removal + best-take selection (from n8n)
          # Audio regions = confirmed speech zones (from silencedetect above)
          #
          # IMPORTANT: we check for overlap but keep the FULL word-segment bounds.
          # Old approach clipped words to audio boundaries → chopped first/last
          # syllables. Now: if any part of a word overlaps with a speech zone,
          # keep the whole word untouched.
          def intersect(word_segs, aud_segs, min_overlap=0.05):
              kept_segs = []
              seen = set()
              for i, ws in enumerate(word_segs):
                  for au in aud_segs:
                      ol_s = max(ws['start'], au['start'])
                      ol_e = min(ws['end'],   au['end'])
                      if ol_e - ol_s >= min_overlap and i not in seen:
                          kept_segs.append({'start': ws['start'], 'end': ws['end']})
                          seen.add(i)
                          break
              kept_segs.sort(key=lambda x: x['start'])
              # Merge segments that are ≤ 80ms apart
              merged = []
              for seg in kept_segs:
                  if merged and seg['start'] - merged[-1]['end'] <= 0.08:
                      merged[-1]['end'] = max(merged[-1]['end'], seg['end'])
                  else:
                      merged.append(dict(seg))
              return merged

          final_segs = intersect(segments, audio_segs)
          if not final_segs:
              print("WARNING: Intersection empty — falling back to word-segments")
              final_segs = segments

          kept = sum(s['end'] - s['start'] for s in final_segs)
          print(f"Final segments: {len(final_segs)}  keeping {kept:.1f}s / {total_dur:.1f}s ({100*kept/total_dur:.0f}%)")

          # ── Build filter_complex ──────────────────────────────────────────
          n           = len(final_segs)
          parts       = []
          output_dur  = kept
          fade_dur    = round(min(0.3, output_dur * 0.05), 3)
          fade_out_st = round(output_dur - fade_dur, 3)

          # Trim each segment
          for i, seg in enumerate(final_segs):
              s, e = seg['start'], seg['end']
              parts.append(f"[0:v]trim=start={s}:end={e},setpts=PTS-STARTPTS[v{i}]")
              if has_audio:
                  parts.append(f"[0:a]atrim=start={s}:end={e},asetpts=PTS-STARTPTS[a{i}]")

          # Video concat
          v_in = ''.join(f'[v{i}]' for i in range(n))
          parts.append(f"{v_in}concat=n={n}:v=1:a=0[vcat]")

          # Audio: 25ms acrossfade at every cut point
          # Triangle window (tri) — smoothest curve for voice
          # Makes cuts sound invisible instead of hard-spliced
          if has_audio:
              if n == 1:
                  parts.append("[a0]anull[acat]")
              elif n == 2:
                  parts.append("[a0][a1]acrossfade=d=0.025:c1=tri:c2=tri[acat]")
              else:
                  parts.append("[a0][a1]acrossfade=d=0.025:c1=tri:c2=tri[af1]")
                  for i in range(2, n):
                      in_lbl  = f"af{i-1}"
                      out_lbl = "acat" if i == n - 1 else f"af{i}"
                      parts.append(f"[{in_lbl}][a{i}]acrossfade=d=0.025:c1=tri:c2=tri[{out_lbl}]")

          # Captions
          def esc(t):
              t = t.replace('\\', '\\\\')
              t = t.replace("'", "’")
              t = t.replace(':', '\\:')
              t = t.replace('[', '\\[')
              t = t.replace(']', '\\]')
              t = t.replace(',', '\\,')
              t = t.replace(';', '\\;')
              return t

          # Instagram/Reels-style: large text, bottom center, above UI chrome
          # y = bottom of frame  minus  text height  minus  box padding  minus  safe margin
          # Scales with video height so it works for both portrait (1920) and landscape (1080)
          fs         = max(68, int(vh * 0.045))   # ~86px on 1920, ~68px on 1080
          bpad       = 22                          # box padding around text
          bot_margin = max(50, int(vh * 0.06))     # distance from bottom edge (~115px on 1920)
          y_expr     = f"h-text_h-{bpad}-{bot_margin}"

          dt_filters = [
              f"drawtext=fontsize={fs}:fontcolor=white:text='{esc(c['text'])}'"
              f":x=(w-text_w)/2:y={y_expr}"
              f":box=1:boxcolor=black@0.75:boxborderw={bpad}"
              f":enable='between(t,{c['start']},{c['end']})'"
              for c in captions
          ]
          caption_chain = ','.join(dt_filters) + ',' if dt_filters else ''

          # Video: captions + fade in/out only
          parts.append(
              f"[vcat]{caption_chain}"
              f"fade=t=in:st=0:d={fade_dur},"
              f"fade=t=out:st={fade_out_st}:d={fade_dur}[vout]"
          )

          filter_complex = ';'.join(parts)

          # ── Run FFmpeg ────────────────────────────────────────────────────
          map_args = ['-map', '[vout]']
          if has_audio:
              map_args += ['-map', '[acat]']

          cmd = [
              'ffmpeg', '-y',
              '-threads', '2',          # cap CPU threads → lower memory pressure
              '-i', 'source_video.mp4',
              '-filter_complex', filter_complex,
              *map_args,
              '-c:v', 'libx264', '-preset', 'fast', '-crf', '23',
              '-c:a', 'aac', '-b:a', '128k',
              'output_video.mp4'
          ]

          print("Running FFmpeg...")
          # Write stderr to file — NOT capture_output=True.
          # capture_output buffers every frame-progress line in RAM → OOM → SIGTERM on large files.
          with open('ffmpeg_stderr.txt', 'w') as err_f:
              ret = subprocess.call(cmd, stderr=err_f)

          if ret != 0:
              print(f"FFmpeg failed (exit {ret}). Last 3000 chars of stderr:")
              with open('ffmpeg_stderr.txt') as f:
                  content = f.read()
              print(content[-3000:])
              sys.exit(1)

          size_mb = os.path.getsize('output_video.mp4') / 1024 / 1024
          print(f"Done! Output: {size_mb:.1f} MB")
          PYTHON

      - name: Create text overlay card
        if: ${{ github.event.inputs.overlay_text != '' }}
        env:
          OVERLAY_TEXT: ${{ github.event.inputs.overlay_text }}
          OVERLAY_POSITION: ${{ github.event.inputs.overlay_position }}
        run: |
          python3 << 'PYTHON'
          import json, os, subprocess, sys

          text     = os.environ.get('OVERLAY_TEXT', '').strip()
          position = os.environ.get('OVERLAY_POSITION', 'start').strip()

          if not text:
              print("No overlay text — skipping card")
              sys.exit(0)

          print(f"Creating overlay card: '{text}' at position={position}")

          # ── Get dimensions from already-processed video ───────────────────
          probe = subprocess.run(
              ['ffprobe', '-v', 'quiet', '-print_format', 'json',
               '-show_streams', '-show_format', 'output_video.mp4'],
              capture_output=True, text=True, check=True
          )
          data    = json.loads(probe.stdout)
          streams = data['streams']
          vs      = next(s for s in streams if s['codec_type'] == 'video')
          w, h    = int(vs['width']), int(vs['height'])
          fps     = vs.get('r_frame_rate', '30/1')

          # ── Font ──────────────────────────────────────────────────────────
          fc = subprocess.run(
              ['fc-match', 'DejaVu Sans:bold', '--format=%{file}'],
              capture_output=True, text=True
          )
          font = fc.stdout.strip() or '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf'
          print(f"Font: {font}")

          # ── Text size + position ─────────────────────────────────────────
          fs = max(80, h // 14)   # ~137px on 1920px tall video
          bpad = 30

          # ── Escape text for FFmpeg drawtext ───────────────────────────────
          safe = (text
              .replace('\\', '\\\\')
              .replace("'", "’")
              .replace(':', '\\:')
              .replace('[', '\\[')
              .replace(']', '\\]')
              .replace(',', '\\,')
              .replace(';', '\\;')
          )

          # ── Slide-in from left animation ──────────────────────────────────
          # t=0.00 : text fully off-screen left  (x = -text_w)
          # t=0.60 : text fully centered          (x = (w-text_w)/2)
          # t>0.60 : holds at center
          # Formula: start_x + (end_x - start_x) * progress
          #   start_x = -text_w
          #   end_x   = (w-text_w)/2
          #   delta   = (w+text_w)/2
          x_anim = "if(lt(t\\,0.6)\\,-text_w+((w+text_w)/2)*t/0.6\\,(w-text_w)/2)"
          y_center = "(h-text_h)/2"

          filter_str = (
              f"[0:v]"
              f"drawtext="
              f"fontfile='{font}':"
              f"fontsize={fs}:"
              f"fontcolor=white:"
              f"text='{safe}':"
              f"x={x_anim}:"
              f"y={y_center}:"
              f"box=1:boxcolor=black@0.0:boxborderw={bpad},"  # invisible box = clean padding
              f"fade=t=in:st=0:d=0.3,"
              f"fade=t=out:st=2.5:d=0.5"
              f"[vcard];"
              f"[1:a]afade=t=out:st=2.5:d=0.5[acard]"
          )

          # ── Render 3-second black card ────────────────────────────────────
          cmd_card = [
              'ffmpeg', '-y', '-threads', '2',
              '-f', 'lavfi', '-t', '3.0',
              '-i', f'color=c=black:size={w}x{h}:rate={fps}',
              '-f', 'lavfi', '-t', '3.0',
              '-i', 'aevalsrc=0:c=stereo:r=44100',
              '-filter_complex', filter_str,
              '-map', '[vcard]', '-map', '[acard]',
              '-c:v', 'libx264', '-preset', 'fast', '-crf', '23',
              '-c:a', 'aac', '-b:a', '128k',
              'overlay_card.mp4'
          ]
          print("Rendering text card...")
          with open('card_stderr.txt', 'w') as ef:
              ret = subprocess.call(cmd_card, stderr=ef)
          if ret != 0:
              with open('card_stderr.txt') as f:
                  print(f.read()[-2000:])
              sys.exit(1)
          print("Card rendered OK")

          # ── Concatenate card + main video (or reverse) ────────────────────
          if position == 'end':
              order = ['output_video.mp4', 'overlay_card.mp4']
          else:
              order = ['overlay_card.mp4', 'output_video.mp4']

          with open('concat_list.txt', 'w') as f:
              for fn in order:
                  f.write(f"file '{fn}'\n")

          print(f"Concat order: {' → '.join(order)}")
          with open('concat_stderr.txt', 'w') as ef:
              ret2 = subprocess.call(
                  ['ffmpeg', '-y', '-f', 'concat', '-safe', '0',
                   '-i', 'concat_list.txt', '-fflags', '+genpts',
                   '-c', 'copy', 'final_video.mp4'],
                  stderr=ef
              )
          if ret2 != 0:
              with open('concat_stderr.txt') as f:
                  print(f.read()[-2000:])
              sys.exit(1)

          os.rename('final_video.mp4', 'output_video.mp4')
          size_mb = os.path.getsize('output_video.mp4') / 1024 / 1024
          print(f"Overlay added! Final size: {size_mb:.1f} MB")
          PYTHON

      - name: Upload processed video
        run: |
          FILENAME="${{ github.event.inputs.filename }}"
          echo "Uploading edited_${FILENAME}..."

          UPLOAD_RESPONSE=$(curl -s -k \
            -F "reqtype=fileupload" \
            -F "time=72h" \
            -F "fileToUpload=@output_video.mp4;filename=edited_${FILENAME}" \
            https://litterbox.catbox.moe/resources/internals/api.php)

          echo "Upload response: $UPLOAD_RESPONSE"

          if [[ "$UPLOAD_RESPONSE" != https://* ]]; then
            echo "ERROR: Upload failed — $UPLOAD_RESPONSE"
            exit 1
          fi

          echo "TEMP_URL=$UPLOAD_RESPONSE" >> $GITHUB_ENV
          echo "Uploaded to: $UPLOAD_RESPONSE"

      - name: Notify n8n webhook
        run: |
          WEBHOOK_URL="${{ github.event.inputs.webhook_url }}"
          FILENAME="${{ github.event.inputs.filename }}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"tempUrl\": \"$TEMP_URL\", \"filename\": \"edited_${FILENAME}\"}")

          echo "Webhook response: $HTTP_CODE"
          echo "n8n notified!"
