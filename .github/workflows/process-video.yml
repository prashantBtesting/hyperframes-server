name: Process Video — ExpansionOS

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Source video URL (Google Drive or direct)'
        required: true
        type: string
      segments:
        description: 'JSON array of {start, end} segments to keep'
        required: true
        type: string
      captions:
        description: 'JSON array of {text, start, end} captions'
        required: true
        type: string
      filename:
        description: 'Output filename'
        required: true
        type: string
      webhook_url:
        description: 'n8n resume webhook URL'
        required: true
        type: string

jobs:
  process-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Download source video ──────────────────────────────────────────
      - name: Download source video
        run: |
          VIDEO_URL="${{ inputs.video_url }}"
          echo "Downloading: $VIDEO_URL"

          if [[ "$VIDEO_URL" == *"drive.google.com"* ]]; then
            COOKIES=$(mktemp)
            INIT_HTML=$(curl -s -c "$COOKIES" -L "$VIDEO_URL")
            CONFIRM=$(echo "$INIT_HTML" | grep -oP 'confirm=\K[^&"'"'"'\\s]+' | head -1)
            FILE_ID=$(echo "$VIDEO_URL" | grep -oP 'id=\K[^&]+' | head -1)

            if [ -n "$CONFIRM" ] && [ -n "$FILE_ID" ]; then
              echo "Using confirm token: $CONFIRM"
              curl -L -b "$COOKIES" --max-time 300 -o input.mp4 \
                "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${FILE_ID}"
            else
              curl -L -b "$COOKIES" --max-time 300 -o input.mp4 "$VIDEO_URL"
            fi
          else
            curl -L --max-time 300 -o input.mp4 "$VIDEO_URL"
          fi

          MIME=$(file --mime-type -b input.mp4)
          echo "Downloaded MIME type: $MIME"
          if [[ "$MIME" == "text/html" || "$MIME" == "text/plain" ]]; then
            echo "ERROR: Got HTML page instead of video file (Google Drive auth issue)"
            exit 1
          fi
          echo "Download complete: $(du -sh input.mp4 | cut -f1)"

      # ── 2. Install FFmpeg ─────────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -y -q
          sudo apt-get install -y -q ffmpeg
          ffmpeg -version | head -1
          ffprobe -version | head -1

      # ── 3. FFmpeg: cut segments + burn captions ───────────────────────────
      - name: Process video with FFmpeg
        env:
          SEGMENTS: ${{ inputs.segments }}
          CAPTIONS: ${{ inputs.captions }}
        run: |
          python3 << 'PYEOF'
          import json, subprocess, os, sys

          segments = json.loads(os.environ['SEGMENTS'])
          captions = json.loads(os.environ['CAPTIONS'])
          print(f"Segments: {len(segments)}, Captions: {len(captions)}")

          # Probe for audio stream
          r = subprocess.run(
            ['ffprobe', '-v', 'error', '-select_streams', 'a:0',
             '-show_entries', 'stream=codec_type',
             '-of', 'default=noprint_wrappers=1', 'input.mp4'],
            capture_output=True, text=True
          )
          has_audio = bool(r.stdout.strip())
          print(f"Has audio: {has_audio}")

          # Build filter_complex for cutting segments
          parts, concat = [], ''
          for i, s in enumerate(segments):
            parts.append(f"[0:v]trim=start={s['start']}:end={s['end']},setpts=PTS-STARTPTS[v{i}]")
            if has_audio:
              parts.append(f"[0:a]atrim=start={s['start']}:end={s['end']},asetpts=PTS-STARTPTS[a{i}]")
              concat += f"[v{i}][a{i}]"
            else:
              concat += f"[v{i}]"

          a_flag  = ':a=1' if has_audio else ':a=0'
          aout    = '[aout]' if has_audio else ''
          parts.append(f"{concat}concat=n={len(segments)}:v=1{a_flag}[vout]{aout}")
          cut_filter = ';'.join(parts)

          cmd = ['ffmpeg', '-y', '-i', 'input.mp4',
                 '-filter_complex', cut_filter, '-map', '[vout]']
          if has_audio:
            cmd += ['-map', '[aout]', '-c:a', 'aac', '-b:a', '128k']
          else:
            cmd += ['-an']
          cmd += ['-c:v', 'libx264', '-preset', 'fast', '-crf', '22', 'cut.mp4']

          print("Running FFmpeg cut...")
          subprocess.run(cmd, check=True)
          print("Cut complete")

          # Burn captions via drawtext
          cap_list = [c for c in captions if c.get('text', '').strip()]
          if cap_list:
            r2 = subprocess.run(
              ['ffprobe', '-v', 'error', '-select_streams', 'v:0',
               '-show_entries', 'stream=width,height', '-of', 'csv=p=0', 'cut.mp4'],
              capture_output=True, text=True
            )
            dims = r2.stdout.strip().split(',')
            vw = int(dims[0]) if dims and dims[0] else 1080
            vh = int(dims[1]) if len(dims) > 1 and dims[1] else 1920

            fs = max(56, int(vw * 0.065))   # ~70px on 1080p (viral size)
            cy = int(vh * 0.82)              # 82% down — caption zone
            bw = max(4, int(fs * 0.08))     # outline thickness

            def esc(t):
              return (t or '').replace('\\', '\\\\').replace("'", "\\'") \
                              .replace(':', '\\:').replace('[', '\\[') \
                              .replace(']', '\\]').replace(',', '\\,') \
                              .replace(';', '\\;').replace('\n', ' ').strip()

            # Viral style: bold white text with black outline (no box bg)
            vf = ','.join(
              f"drawtext=fontsize={fs}:fontcolor=white:text='{esc(c['text'])}'"
              f":x=(w-text_w)/2:y={cy}"
              f":borderw={bw}:bordercolor=black@0.95"
              f":enable='between(t\\,{c['start']}\\,{c['end']})'"
              for c in cap_list
            )

            cmd2 = ['ffmpeg', '-y', '-i', 'cut.mp4', '-vf', vf,
                    '-c:v', 'libx264', '-preset', 'fast', '-crf', '22']
            cmd2 += ['-c:a', 'copy'] if has_audio else ['-an']
            cmd2.append('output.mp4')

            print(f"Burning {len(cap_list)} captions...")
            subprocess.run(cmd2, check=True)
            print("Captions burned")
          else:
            os.rename('cut.mp4', 'output.mp4')
            print("No captions to burn")

          size = os.path.getsize('output.mp4')
          print(f"Output size: {size / 1024 / 1024:.1f} MB")
          PYEOF

      # ── 3. Upload to litterbox.catbox.moe (free, 72h retention) ─────────
      - name: Upload processed video
        id: upload
        run: |
          FILENAME="edited_${{ inputs.filename }}"
          echo "Uploading ${FILENAME}..."

          TEMP_URL=$(curl -s \
            -F "reqtype=fileupload" \
            -F "time=72h" \
            -F "fileToUpload=@output.mp4" \
            "https://litterbox.catbox.moe/resources/internals/api.php" \
            --max-time 300)

          echo "Uploaded: $TEMP_URL"
          echo "temp_url=${TEMP_URL}" >> $GITHUB_OUTPUT
          echo "filename=${FILENAME}"  >> $GITHUB_OUTPUT

      # ── 4. Notify n8n to resume workflow ──────────────────────────────────
      - name: Notify n8n webhook
        run: |
          curl -X POST "${{ inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            --max-time 30 \
            -d "{
              \"tempUrl\": \"${{ steps.upload.outputs.temp_url }}\",
              \"filename\": \"${{ steps.upload.outputs.filename }}\"
            }"
          echo "n8n notified — workflow will resume"
